name: ${project_pascal}
options:
  minimumXcodeGenVersion: 2.38.0
targets:
  ${project_pascal}:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: ios/${project_pascal}/Sources
      - path: ios/${project_pascal}/Resources
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: ${package_id}
      PRODUCT_NAME: ${display_name}
