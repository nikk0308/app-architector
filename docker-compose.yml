version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - api_storage:/app/apps/api/storage
      - api_data:/app/apps/api/data

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        VITE_API_BASE_URL: http://localhost:3000
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  api_storage:
  api_data:
