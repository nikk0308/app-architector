name: 01 bootstrap server

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Resolve deploy config
        shell: bash
        run: |
          set -euo pipefail
          DOMAIN='${{ vars.DEPLOY_DOMAIN }}'
          SERVER_IP='${{ vars.DEPLOY_SERVER_IP }}'
          SSH_USER='${{ vars.DEPLOY_SSH_USER }}'
          APP_ROOT='${{ vars.DEPLOY_APP_ROOT }}'
          WEB_ROOT='${{ vars.DEPLOY_WEB_ROOT }}'
          API_PORT='${{ vars.DEPLOY_API_PORT }}'

          [ -n "$DOMAIN" ] || { echo 'DEPLOY_DOMAIN is required'; exit 1; }
          [ -n "$SERVER_IP" ] || { echo 'DEPLOY_SERVER_IP is required'; exit 1; }

          SSH_USER=${SSH_USER:-root}
          APP_ROOT=${APP_ROOT:-/opt/mobile-architecture-generator}
          WEB_ROOT=${WEB_ROOT:-/var/www/$DOMAIN}
          API_PORT=${API_PORT:-3000}

          echo "DOMAIN=$DOMAIN" >> "$GITHUB_ENV"
          echo "SERVER_IP=$SERVER_IP" >> "$GITHUB_ENV"
          echo "SSH_USER=$SSH_USER" >> "$GITHUB_ENV"
          echo "APP_ROOT=$APP_ROOT" >> "$GITHUB_ENV"
          echo "WEB_ROOT=$WEB_ROOT" >> "$GITHUB_ENV"
          echo "API_PORT=$API_PORT" >> "$GITHUB_ENV"

      - name: Prepare SSH key
        env:
          DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
        run: python3 scripts/deploy/prepare_ssh_key.py

      - name: Trust server host key
        env:
          DEPLOY_KNOWN_HOSTS_CONTENT: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          touch ~/.ssh/known_hosts
          if [ -n "$DEPLOY_KNOWN_HOSTS_CONTENT" ]; then
            printf '%s' "$DEPLOY_KNOWN_HOSTS_CONTENT" > ~/.ssh/known_hosts
          else
            ssh-keyscan -H "$SERVER_IP" >> ~/.ssh/known_hosts 2>/dev/null
          fi
          chmod 600 ~/.ssh/known_hosts

      - name: Upload templates
        shell: bash
        run: |
          set -euo pipefail
          cat infra/deploy/templates/bootstrap.index.template | ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes "$SSH_USER@$SERVER_IP" 'cat > /tmp/bootstrap.index.template'
          cat infra/deploy/templates/nginx.http.template | ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes "$SSH_USER@$SERVER_IP" 'cat > /tmp/nginx.http.template'
          printf '%s' "$DOMAIN" | ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes "$SSH_USER@$SERVER_IP" 'cat > /tmp/domain.txt'
          printf '%s' "$WEB_ROOT" | ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes "$SSH_USER@$SERVER_IP" 'cat > /tmp/web_root.txt'
          printf '%s' "$API_PORT" | ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes "$SSH_USER@$SERVER_IP" 'cat > /tmp/api_port.txt'

      - name: Bootstrap server
        shell: bash
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes "$SSH_USER@$SERVER_IP" \
            "DOMAIN='$DOMAIN' APP_ROOT='$APP_ROOT' WEB_ROOT='$WEB_ROOT' API_PORT='$API_PORT' bash -s" \
            < scripts/deploy/bootstrap_remote.sh
