name: 03 deploy

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Resolve deploy config
        shell: bash
        run: |
          set -euo pipefail
          DOMAIN='${{ vars.DEPLOY_DOMAIN }}'
          SERVER_IP='${{ vars.DEPLOY_SERVER_IP }}'
          SSH_USER='${{ vars.DEPLOY_SSH_USER }}'
          APP_ROOT='${{ vars.DEPLOY_APP_ROOT }}'
          WEB_ROOT='${{ vars.DEPLOY_WEB_ROOT }}'
          API_PORT='${{ vars.DEPLOY_API_PORT }}'

          [ -n "$DOMAIN" ] || { echo 'DEPLOY_DOMAIN is required'; exit 1; }
          [ -n "$SERVER_IP" ] || { echo 'DEPLOY_SERVER_IP is required'; exit 1; }

          SSH_USER=${SSH_USER:-root}
          APP_ROOT=${APP_ROOT:-/opt/mobile-architecture-generator}
          WEB_ROOT=${WEB_ROOT:-/var/www/$DOMAIN}
          API_PORT=${API_PORT:-3000}
          SERVICE_NAME=$(printf '%s' "$DOMAIN" | tr -cs '[:alnum:]' '-' | tr '[:upper:]' '[:lower:]' | sed 's/^-//;s/-$//').service
          RELEASE_NAME=release-${GITHUB_SHA::12}

          echo "DOMAIN=$DOMAIN" >> "$GITHUB_ENV"
          echo "SERVER_IP=$SERVER_IP" >> "$GITHUB_ENV"
          echo "SSH_USER=$SSH_USER" >> "$GITHUB_ENV"
          echo "APP_ROOT=$APP_ROOT" >> "$GITHUB_ENV"
          echo "WEB_ROOT=$WEB_ROOT" >> "$GITHUB_ENV"
          echo "API_PORT=$API_PORT" >> "$GITHUB_ENV"
          echo "SERVICE_NAME=$SERVICE_NAME" >> "$GITHUB_ENV"
          echo "RELEASE_NAME=$RELEASE_NAME" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: npm install --no-fund --no-audit

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Prepare SSH key
        env:
          DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
        run: python3 scripts/deploy/prepare_ssh_key.py

      - name: Trust server host key
        env:
          DEPLOY_KNOWN_HOSTS_CONTENT: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          touch ~/.ssh/known_hosts
          if [ -n "$DEPLOY_KNOWN_HOSTS_CONTENT" ]; then
            printf '%s' "$DEPLOY_KNOWN_HOSTS_CONTENT" > ~/.ssh/known_hosts
          else
            ssh-keyscan -H "$SERVER_IP" >> ~/.ssh/known_hosts 2>/dev/null
          fi
          chmod 600 ~/.ssh/known_hosts

      - name: Verify SSH access
        shell: bash
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -o BatchMode=yes \
            "$SSH_USER@$SERVER_IP" 'true'

      - name: Encode runtime env
        env:
          APP_RUNTIME_ENV_CONTENT: ${{ secrets.APP_RUNTIME_ENV }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "$APP_RUNTIME_ENV_CONTENT" ]; then
            printf '%s' "$APP_RUNTIME_ENV_CONTENT" | base64 -w 0 > /tmp/runtime_env.b64
            echo "RUNTIME_ENV_B64=$(cat /tmp/runtime_env.b64)" >> "$GITHUB_ENV"
          fi

      - name: Create release directory
        shell: bash
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes "$SSH_USER@$SERVER_IP" "mkdir -p '$APP_ROOT/releases/$RELEASE_NAME'"

      - name: Upload release
        shell: bash
        run: |
          set -euo pipefail
          export RSYNC_RSH="ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes"
          rsync -az \
            --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '.env' \
            --exclude '*.log' \
            --exclude '__pycache__/' \
            --exclude 'node_modules/' \
            "$GITHUB_WORKSPACE/" "$SSH_USER@$SERVER_IP:$APP_ROOT/releases/$RELEASE_NAME/"

      - name: Upload service template inputs
        shell: bash
        run: |
          set -euo pipefail
          printf '%s' "$APP_ROOT" | ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes "$SSH_USER@$SERVER_IP" 'cat > /tmp/app_root.txt'
          printf '%s' "$SERVICE_NAME" | ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes "$SSH_USER@$SERVER_IP" 'cat > /tmp/service_name.txt'
          printf '%s' "$APP_ROOT/releases/$RELEASE_NAME/infra/deploy/templates/app.service.template" | ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes "$SSH_USER@$SERVER_IP" 'cat > /tmp/service_template.txt'

      - name: Activate release
        shell: bash
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes "$SSH_USER@$SERVER_IP" \
            "DOMAIN='$DOMAIN' APP_ROOT='$APP_ROOT' WEB_ROOT='$WEB_ROOT' API_PORT='$API_PORT' SERVICE_NAME='$SERVICE_NAME' RELEASE_NAME='$RELEASE_NAME' RUNTIME_ENV_B64='${RUNTIME_ENV_B64:-}' bash -s" \
            < scripts/deploy/deploy_remote.sh
