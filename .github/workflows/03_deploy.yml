name: 03 deploy

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DIAGNOSTICS_DIR: deploy-diagnostics

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Resolve deploy config
        shell: bash
        run: |
          set -euo pipefail
          DOMAIN='${{ vars.DEPLOY_DOMAIN }}'
          SERVER_IP='${{ vars.DEPLOY_SERVER_IP }}'
          SSH_USER='${{ vars.DEPLOY_SSH_USER }}'
          APP_ROOT='${{ vars.DEPLOY_APP_ROOT }}'
          WEB_ROOT='${{ vars.DEPLOY_WEB_ROOT }}'
          API_PORT='${{ vars.DEPLOY_API_PORT }}'

          [ -n "$DOMAIN" ] || { echo 'DEPLOY_DOMAIN is required'; exit 1; }
          [ -n "$SERVER_IP" ] || { echo 'DEPLOY_SERVER_IP is required'; exit 1; }

          SSH_USER=${SSH_USER:-root}
          APP_ROOT=${APP_ROOT:-/opt/mobile-architecture-generator}
          WEB_ROOT=${WEB_ROOT:-/var/www/$DOMAIN}
          API_PORT=${API_PORT:-3000}
          SERVICE_NAME=$(printf '%s' "$DOMAIN" | tr -cs '[:alnum:]' '-' | tr '[:upper:]' '[:lower:]' | sed 's/^-//;s/-$//').service
          RELEASE_NAME=release-${GITHUB_SHA::12}

          echo "DOMAIN=$DOMAIN" >> "$GITHUB_ENV"
          echo "SERVER_IP=$SERVER_IP" >> "$GITHUB_ENV"
          echo "SSH_USER=$SSH_USER" >> "$GITHUB_ENV"
          echo "APP_ROOT=$APP_ROOT" >> "$GITHUB_ENV"
          echo "WEB_ROOT=$WEB_ROOT" >> "$GITHUB_ENV"
          echo "API_PORT=$API_PORT" >> "$GITHUB_ENV"
          echo "SERVICE_NAME=$SERVICE_NAME" >> "$GITHUB_ENV"
          echo "RELEASE_NAME=$RELEASE_NAME" >> "$GITHUB_ENV"
          mkdir -p "$DIAGNOSTICS_DIR"
          {
            echo "workflow_status=started"
            echo "domain=$DOMAIN"
            echo "server_ip=$SERVER_IP"
            echo "ssh_user=$SSH_USER"
            echo "app_root=$APP_ROOT"
            echo "web_root=$WEB_ROOT"
            echo "api_port=$API_PORT"
            echo "service_name=$SERVICE_NAME"
            echo "release_name=$RELEASE_NAME"
            echo "timestamp_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } > "$DIAGNOSTICS_DIR/workflow-context.env"

      - name: Collect local diagnostics snapshot
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/diagnostics/collect_local_diagnostics.sh "$DIAGNOSTICS_DIR" 2>&1 | tee "$DIAGNOSTICS_DIR/local-diagnostics.log"

      - name: Clean generated source artifacts
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/verify/clean_stale_source_artifacts.sh 2>&1 | tee "$DIAGNOSTICS_DIR/clean-source-artifacts.log"
          bash scripts/diagnostics/collect_local_diagnostics.sh "$DIAGNOSTICS_DIR" 2>&1 | tee -a "$DIAGNOSTICS_DIR/local-diagnostics.log"

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          npm install --no-fund --no-audit 2>&1 | tee "$DIAGNOSTICS_DIR/npm-install.log"

      - name: Verify source tree
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/verify/no_stale_source_artifacts.sh 2>&1 | tee "$DIAGNOSTICS_DIR/verify-source.log"

      - name: Verify phase 3 advisor contracts
        shell: bash
        run: |
          set -euo pipefail
          node scripts/verify/phase3_contracts.mjs 2>&1 | tee "$DIAGNOSTICS_DIR/phase3-contracts.log"

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          npm run build 2>&1 | tee "$DIAGNOSTICS_DIR/build.log"
          bash scripts/diagnostics/collect_build_outputs.sh "$DIAGNOSTICS_DIR" 2>&1 | tee "$DIAGNOSTICS_DIR/build-diagnostics.log"

      - name: Test
        shell: bash
        run: |
          set -euo pipefail
          npm test 2>&1 | tee "$DIAGNOSTICS_DIR/test.log"

      - name: Validate built release
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "Checking built release files..."
            test -f apps/api/dist/index.js
            test -d apps/web/dist
            test -f apps/web/dist/index.html
            test -f packages/shared/dist/index.js
            if grep -R "localhost:4000" apps/web/dist >/tmp/local-host-leak.txt 2>/dev/null; then
              echo "Production web bundle still contains localhost:4000"
              cat /tmp/local-host-leak.txt
              exit 1
            fi
            echo "Built release validation passed."
          } 2>&1 | tee "$DIAGNOSTICS_DIR/validate-built-release.log"

      - name: Prepare SSH key
        env:
          DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY || secrets.SSH_PRIVATE_KEY || secrets.SERVER_SSH_PRIVATE_KEY || secrets.DO_SSH_PRIVATE_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/deploy/prepare_ssh_key.py 2>&1 | tee "$DIAGNOSTICS_DIR/prepare-ssh-key.log"

      - name: Trust server host key
        env:
          DEPLOY_KNOWN_HOSTS_CONTENT: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          touch ~/.ssh/known_hosts
          if [ -n "$DEPLOY_KNOWN_HOSTS_CONTENT" ]; then
            printf '%s' "$DEPLOY_KNOWN_HOSTS_CONTENT" > ~/.ssh/known_hosts
          else
            ssh-keyscan -H "$SERVER_IP" >> ~/.ssh/known_hosts 2>/dev/null
          fi
          chmod 600 ~/.ssh/known_hosts

      - name: Verify SSH access
        shell: bash
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -o BatchMode=yes \
            "$SSH_USER@$SERVER_IP" 'true' 2>&1 | tee "$DIAGNOSTICS_DIR/verify-ssh.log"

      - name: Encode runtime env
        env:
          APP_RUNTIME_ENV_CONTENT: ${{ secrets.APP_RUNTIME_ENV }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "$APP_RUNTIME_ENV_CONTENT" ]; then
            printf '%s' "$APP_RUNTIME_ENV_CONTENT" | base64 -w 0 > /tmp/runtime_env.b64
            echo "RUNTIME_ENV_B64=$(cat /tmp/runtime_env.b64)" >> "$GITHUB_ENV"
          else
            echo "APP_RUNTIME_ENV secret is empty; remote defaults will be used." | tee "$DIAGNOSTICS_DIR/runtime-env.log"
          fi

      - name: Create release directory
        shell: bash
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "$SSH_USER@$SERVER_IP" \
            "mkdir -p '$APP_ROOT/releases/$RELEASE_NAME'"

      - name: Upload release
        shell: bash
        run: |
          set -euo pipefail
          rsync -az \
            -e "ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes" \
            --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '.env' \
            --exclude '*.log' \
            --exclude '__pycache__/' \
            --exclude 'node_modules/' \
            --exclude 'deploy-diagnostics/' \
            "$GITHUB_WORKSPACE/" "$SSH_USER@$SERVER_IP:$APP_ROOT/releases/$RELEASE_NAME/" \
            2>&1 | tee "$DIAGNOSTICS_DIR/rsync-release.log"

      - name: Activate release
        shell: bash
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "$SSH_USER@$SERVER_IP" \
            "DOMAIN='$DOMAIN' APP_ROOT='$APP_ROOT' WEB_ROOT='$WEB_ROOT' API_PORT='$API_PORT' SERVICE_NAME='$SERVICE_NAME' RELEASE_NAME='$RELEASE_NAME' RUNTIME_ENV_B64='${RUNTIME_ENV_B64:-}' bash -s" \
            < scripts/deploy/deploy_remote.sh 2>&1 | tee "$DIAGNOSTICS_DIR/activate-release.log"

      - name: Smoke test deployed site
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$DIAGNOSTICS_DIR"

          HTTPS_EXPECTED="$(ssh -i ~/.ssh/deploy_key \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "$SSH_USER@$SERVER_IP" \
            "test -f '/etc/letsencrypt/live/$DOMAIN/fullchain.pem' && test -f '/etc/letsencrypt/live/$DOMAIN/privkey.pem' && echo yes || echo no")"
          echo "https_expected=$HTTPS_EXPECTED" | tee "$DIAGNOSTICS_DIR/public-endpoint-mode.env"

          curl -sSIL --max-time 8 --resolve "$DOMAIN:80:$SERVER_IP" "http://$DOMAIN/" \
            | tee "$DIAGNOSTICS_DIR/smoke-http-index-headers.txt"

          if [ "$HTTPS_EXPECTED" = "yes" ]; then
            curl -kfsSL --max-time 10 --resolve "$DOMAIN:443:$SERVER_IP" "https://$DOMAIN/api/health" \
              | tee "$DIAGNOSTICS_DIR/smoke-https-health.json"
            curl -kfsSL --max-time 10 --resolve "$DOMAIN:443:$SERVER_IP" "https://$DOMAIN/" \
              > "$DIAGNOSTICS_DIR/smoke-https-index.html"
            grep -qi '<div id="root"' "$DIAGNOSTICS_DIR/smoke-https-index.html"
          else
            curl -fsSL --max-time 10 --resolve "$DOMAIN:80:$SERVER_IP" "http://$DOMAIN/api/health" \
              | tee "$DIAGNOSTICS_DIR/smoke-http-health.json"
            curl -fsSL --max-time 10 --resolve "$DOMAIN:80:$SERVER_IP" "http://$DOMAIN/" \
              > "$DIAGNOSTICS_DIR/smoke-http-index.html"
            grep -qi '<div id="root"' "$DIAGNOSTICS_DIR/smoke-http-index.html"
          fi

      - name: Fetch remote diagnostics snapshot
        if: ${{ always() }}
        continue-on-error: true
        shell: bash
        run: |
          set +e
          bash scripts/deploy/fetch_remote_diagnostics.sh 2>&1 | tee "$DIAGNOSTICS_DIR/fetch-remote-diagnostics.log"

      - name: Mark diagnostics success
        if: ${{ success() }}
        shell: bash
        run: |
          set -euo pipefail
          sed -i 's/^workflow_status=.*/workflow_status=success/' "$DIAGNOSTICS_DIR/workflow-context.env" || true

      - name: Collect deploy diagnostics
        if: ${{ failure() }}
        continue-on-error: true
        shell: bash
        run: |
          set +e
          mkdir -p "$DIAGNOSTICS_DIR"
          {
            echo "workflow_status=failed"
            echo "domain=${DOMAIN:-}"
            echo "server_ip=${SERVER_IP:-}"
            echo "ssh_user=${SSH_USER:-}"
            echo "app_root=${APP_ROOT:-}"
            echo "web_root=${WEB_ROOT:-}"
            echo "api_port=${API_PORT:-}"
            echo "service_name=${SERVICE_NAME:-}"
            echo "release_name=${RELEASE_NAME:-}"
            echo "timestamp_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } > "$DIAGNOSTICS_DIR/workflow-context.env"

          bash scripts/diagnostics/collect_local_diagnostics.sh "$DIAGNOSTICS_DIR" >> "$DIAGNOSTICS_DIR/local-diagnostics.log" 2>&1 || true

          if [ -z "${SERVER_IP:-}" ] || [ -z "${SSH_USER:-}" ]; then
            echo "SERVER_IP or SSH_USER is unavailable; remote diagnostics skipped." > "$DIAGNOSTICS_DIR/remote-diagnostics-skipped.txt"
            exit 0
          fi

          if [ ! -f ~/.ssh/deploy_key ]; then
            echo "SSH deploy key was not prepared before the failure; remote diagnostics skipped." > "$DIAGNOSTICS_DIR/remote-diagnostics-skipped.txt"
            exit 0
          fi

          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes "$SSH_USER@$SERVER_IP" \
            "APP_ROOT='$APP_ROOT' SERVICE_NAME='$SERVICE_NAME' API_PORT='$API_PORT' RELEASE_NAME='$RELEASE_NAME' bash -s" <<'REMOTE_DIAG' || true
          set +e
          mkdir -p /tmp/mag-deploy-diagnostics
          cp -a "$APP_ROOT/shared/logs/deploy-$RELEASE_NAME"* /tmp/mag-deploy-diagnostics/ 2>/dev/null || true
          systemctl status "$SERVICE_NAME" --no-pager > /tmp/mag-deploy-diagnostics/systemctl-status.txt 2>&1 || true
          journalctl -u "$SERVICE_NAME" --no-pager -n 250 > /tmp/mag-deploy-diagnostics/journal.txt 2>&1 || true
          nginx -t > /tmp/mag-deploy-diagnostics/nginx-test.txt 2>&1 || true
          ss -ltnp > /tmp/mag-deploy-diagnostics/ports.txt 2>&1 || true
          curl -v --max-time 5 "http://127.0.0.1:$API_PORT/api/health" > /tmp/mag-deploy-diagnostics/remote-health.txt 2>&1 || true
          find "$APP_ROOT" -maxdepth 3 -type f -printf '%p %s bytes\n' > /tmp/mag-deploy-diagnostics/remote-app-tree.txt 2>&1 || true
          REMOTE_DIAG

          rsync -az -e "ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes" \
            "$SSH_USER@$SERVER_IP:/tmp/mag-deploy-diagnostics/" "$DIAGNOSTICS_DIR/" || true

      - name: Summarize failure diagnostics
        if: always()
        continue-on-error: true
        shell: bash
        run: bash scripts/diagnostics/summarize_failure.sh deploy-diagnostics

      - name: Upload deploy diagnostics
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: deploy-diagnostics
          path: deploy-diagnostics
          if-no-files-found: warn
          retention-days: 7
